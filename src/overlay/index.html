<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TWiSTroll</title>
<style>
:root{
  --jamie:#2DD4BF;
  --del:#F97316;
  --taco:#84CC16;
  --robin:#F472B6;
  --fred:#EF4444;
  --notad:#B8860B;
  --tw:#FF4D00;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:rgba(0,0,0,0)!important;
  margin:0!important;padding:0!important;overflow:hidden!important;
  width:340px;height:1080px;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* === CANVAS — fully transparent, bubbles float freely === */
.canvas{
  width:340px;height:1080px;
  position:relative;
}

/* === WATERMARK — hidden === */
.wm{display:none}

/* === RECONNECTING === */
.recon{
  display:none;position:absolute;top:30px;right:14px;
  align-items:center;gap:4px;opacity:0.7;
}
.recon.show{display:flex}
.recon span{font-size:7px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(239,68,68,0.8)}
.recon .sp{
  width:6px;height:6px;
  border:1.5px solid rgba(239,68,68,0.3);border-top-color:#EF4444;
  border-radius:50%;will-change:transform;animation:spin 0.8s linear infinite;
}

/* === PERSONA BUBBLES — floating lower-third, no card chrome === */
.persona{
  position:absolute;
  right:14px;left:14px;
  opacity:0;
  visibility:hidden;
  will-change:transform,opacity;
  transition:opacity 300ms ease,visibility 0ms linear 300ms,transform 300ms ease-out;
  pointer-events:none;
}

/* Pop in — visible */
.persona.visible{
  opacity:1;visibility:visible;pointer-events:auto;
  transition:opacity 300ms ease,visibility 0ms linear 0ms,transform 300ms ease-out;
}

/* Fade out — slower exit */
.persona.fading-out{
  opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity 500ms ease,visibility 0ms linear 500ms,transform 300ms ease-out;
}

/* All bubbles share one centered position (pop-and-vanish: only one visible at a time) */
.persona{top:400px}

/* === BUBBLE — dark fog behind content, no visible edges === */
.bubble{
  display:flex;
  align-items:flex-start;
  gap:10px;
  max-width:260px;
  background:rgba(0,0,0,0.75);
  border:1px solid rgba(0,0,0,0.6);
  border-radius:16px;
  padding:12px 16px;
}

/* === AVATAR === */
.persona-avatar{
  width:40px;height:40px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.persona-avatar svg{
  width:40px;height:40px;
  filter:drop-shadow(0 0 4px rgba(0,0,0,0.8));
}

/* === TEXT container === */
.persona-info{flex:1;min-width:0}

/* === PERSONA NAME === */
.p-name{
  font-size:13px;font-weight:700;letter-spacing:-0.3px;
  text-transform:uppercase;
  margin-bottom:1px;display:block;
  text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,0 0 4px rgba(0,0,0,0.9);
}

/* === PERSONA ROLE (subtitle under name) === */
.p-role{
  font-size:10px;font-weight:500;letter-spacing:0.6px;
  text-transform:uppercase;color:#F1F5F9;opacity:0.65;
  margin-bottom:6px;display:block;
  text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,0 0 3px rgba(0,0,0,0.9);
}

/* === REACTION TEXT === */
.reaction-text{
  font-size:16px;font-weight:600;line-height:1.45;
  color:#F1F5F9;
  text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,0 0 4px rgba(0,0,0,0.9);
  will-change:opacity;transition:opacity 180ms ease;
}

/* === VOICES — name color + --persona-color for wave tinting === */
.persona.jamie      {--persona-color:var(--jamie)}
.persona.delinquent {--persona-color:var(--del)}
.persona.taco       {--persona-color:var(--taco)}
.persona.robin      {--persona-color:var(--robin)}
.persona.fred       {--persona-color:var(--fred)}
.persona.notad      {--persona-color:var(--notad)}
.persona.jamie .p-name{color:var(--jamie)}
.persona.delinquent .p-name{color:var(--del)}
.persona.taco .p-name{color:var(--taco)}
.persona.robin .p-name{color:var(--robin)}
.persona.fred .p-name{color:var(--fred)}
.persona.notad .p-name{color:var(--notad)}

/* === SINE WAVE — "active/speaking" signal, OBS-safe (transform+opacity only) === */
.sine-wave{
  display:flex;align-items:center;justify-content:flex-start;
  gap:3px;
  height:12px;width:40px;
  margin-top:6px;
  opacity:0;
  transition:opacity 200ms ease-out;
}
.sine-wave.speaking{opacity:1}
.wave-bar{
  display:block;
  width:3px;height:12px;
  background:var(--persona-color,#94A3B8);
  border-radius:1.5px;
  transform:scaleY(0.2);transform-origin:center;
  will-change:transform;
  box-shadow:0 0 4px var(--persona-color,transparent);
}
.sine-wave.speaking .wave-bar{
  animation:wave-pulse 900ms cubic-bezier(0.4,0,0.6,1) infinite;
}
.sine-wave.speaking .wave-bar:nth-child(1){animation-delay:0ms}
.sine-wave.speaking .wave-bar:nth-child(2){animation-delay:120ms}
.sine-wave.speaking .wave-bar:nth-child(3){animation-delay:240ms}
.sine-wave.speaking .wave-bar:nth-child(4){animation-delay:360ms}
.sine-wave.speaking .wave-bar:nth-child(5){animation-delay:480ms}
@keyframes wave-pulse{
  0%,100%{transform:scaleY(0.25)}
  50%    {transform:scaleY(1.0)}
}
/* Fred-only: stronger pulse while a sound cue is actively playing */
.sine-wave.speaking.sound-active .wave-bar{
  animation:wave-pulse-strong 600ms cubic-bezier(0.4,0,0.6,1) infinite;
}
@keyframes wave-pulse-strong{
  0%,100%{transform:scaleY(0.4)}
  50%    {transform:scaleY(1.5)}
}

/* === ANIMATIONS — transform + opacity only, OBS safe === */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes spin{to{transform:rotate(360deg)}}

/* === SNIPER BUBBLE — same position, no avatar === */
.persona.sniper .sniper-label{
  font-size:11px;font-weight:700;letter-spacing:0.05em;
  text-transform:uppercase;color:#FFFFFF;margin-bottom:3px;display:block;
  text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,0 0 4px rgba(0,0,0,0.9);
}
.persona.sniper .reaction-text{font-size:14.8px;line-height:1.45;color:#F1F5F9}

/* === SPONSOR BUBBLE — top of overlay, TWiST red accent === */
.sponsor-bubble{
  position:absolute;top:60px;left:10px;right:10px;
  background:rgba(255,77,0,0.12);
  border:1px solid rgba(255,77,0,0.4);
  border-radius:8px;
  padding:10px 14px;
  opacity:0;visibility:hidden;
  will-change:transform,opacity;
  transition:opacity 300ms ease,visibility 0ms linear 300ms;
}
.sponsor-bubble.visible{
  opacity:1;visibility:visible;
  transition:opacity 300ms ease,visibility 0ms linear 0ms;
}
.sponsor-bubble.fading-out{
  opacity:0;visibility:hidden;
  transition:opacity 500ms ease,visibility 0ms linear 500ms;
}
.sponsor-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.sponsor-label{font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:#FF4D00}
.sponsor-text{font-size:15px;font-weight:600;color:#F1F5F9;line-height:1.4}

/* Status — invisible in prod */
.status{
  position:absolute;bottom:4px;right:14px;
  display:flex;align-items:center;gap:3px;
  opacity:0.25;
}
.status span{font-size:6px;font-weight:500;color:rgba(255,255,255,0.5)}
body.prod .status{display:none}

/* === AUDIO UNLOCK PROMPT — compact centered, no fullscreen cover === */
#audio-unlock-prompt{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  cursor:pointer;z-index:9999;
}
.unlock-content{
  text-align:center;color:#F1F5F9;
  font-family:'Inter','system-ui',sans-serif;
  padding:20px 28px;
  border:2px solid var(--tw);
  border-radius:12px;
  background:rgba(30,30,34,0.95);
  box-shadow:0 8px 32px rgba(0,0,0,0.5);
  transition:background 150ms ease;
}
#audio-unlock-prompt:hover .unlock-content{background:rgba(40,40,44,0.95)}
.unlock-icon{font-size:32px;margin-bottom:8px;line-height:1}
.unlock-text{font-size:14px;font-weight:600;margin-bottom:4px}
.unlock-subtext{font-size:11px;opacity:0.6}
</style>

<script>
(function(){
  var WS='ws://localhost:3001',RB=1e3,RM=15e3;
  var ws,ra=0,lr=null;
  var P=new URLSearchParams(location.search);
  if(P.get('mode')==='prod')document.body.classList.add('prod');
  var isDemo=P.get('demo')==='true';
  var IDS=['jamie','delinquent','taco','robin','fred','notad','sniper'];
  var MAP={'not-jamie':'jamie','not-delinquent':'delinquent','not-taco':'taco','not-robin':'robin','not-fred':'fred','not-ad':'notad',
           sniper:'sniper',jamie:'jamie',delinquent:'delinquent',taco:'taco',robin:'robin',fred:'fred',notad:'notad'};

  var currentTimeout=null,currentBubble=null;
  var sponsorTimeout=null;

  // ───────── Audio autoplay unlock ─────────
  // Chrome (and OBS's CEF browser engine) silently suppress Audio.play() until the
  // user interacts with the page. "Control audio via OBS" routes audio through
  // the mixer but does NOT bypass autoplay — a user gesture is still required.
  // Two-layer defense:
  //   A. Try a silent AudioContext unlock on DOMContentLoaded.
  //   B. If A fails AND we're not inside OBS, show a compact centered prompt.
  //      In OBS we skip the prompt entirely — Oliver clicks the scene preview
  //      once, which satisfies CEF's gesture requirement without visual noise.
  var audioUnlocked=false;
  var audioCtx=null;
  var pendingCue=null; // most recent cue that couldn't play — replayed after unlock

  function isInOBS(){return typeof window.obsstudio!=='undefined'}

  async function attemptAudioUnlock(){
    try{
      if(!audioCtx){
        var AC=window.AudioContext||window.webkitAudioContext;
        if(!AC)return false;
        audioCtx=new AC();
      }
      if(audioCtx.state==='suspended')await audioCtx.resume();
      var buf=audioCtx.createBuffer(1,1,22050);
      var src=audioCtx.createBufferSource();
      src.buffer=buf;
      src.connect(audioCtx.destination);
      src.start(0);
      audioUnlocked=true;
      console.log('[audio] Unlocked successfully');
      hideUnlockPrompt();
      if(pendingCue){
        console.log('[audio] Replaying queued cue:',pendingCue);
        var sound=pendingCue;
        pendingCue=null;
        playCue(sound);
      }
      return true;
    }catch(err){
      console.warn('[audio] Unlock failed, prompt required:',err);
      return false;
    }
  }

  function showUnlockPrompt(){
    // In OBS, never show the prompt — don't add visual noise to the broadcast.
    if(isInOBS()){
      console.log('[audio] In OBS — skipping unlock prompt (click scene preview to unlock)');
      return;
    }
    if(document.getElementById('audio-unlock-prompt'))return;
    var prompt=document.createElement('div');
    prompt.id='audio-unlock-prompt';
    prompt.innerHTML='<div class="unlock-content">'+
      '<div class="unlock-icon">🔊</div>'+
      '<div class="unlock-text">Click to enable Fred audio</div>'+
      '<div class="unlock-subtext">Browser autoplay policy</div>'+
      '</div>';
    prompt.addEventListener('click',async function(){
      var ok=await attemptAudioUnlock();
      if(ok)hideUnlockPrompt();
    });
    document.body.appendChild(prompt);
  }

  function hideUnlockPrompt(){
    var p=document.getElementById('audio-unlock-prompt');
    if(p)p.remove();
  }

  // Wave helper — find the sine-wave element inside a persona panel.
  // Returns null for panels that don't have a wave (Not Ad, Sniper).
  function waveIn(panel){return panel?panel.querySelector('.sine-wave'):null}

  function showReaction(id,txt){
    // Hide any currently visible bubble + kill its wave
    if(currentBubble){
      currentBubble.classList.remove('visible');
      currentBubble.classList.add('fading-out');
      var pw=waveIn(currentBubble);
      if(pw){pw.classList.remove('speaking');pw.classList.remove('sound-active')}
      clearTimeout(currentTimeout);
      currentBubble=null;
    }

    var p=document.getElementById('panel-'+id),t=document.getElementById('text-'+id);
    if(!p||!t)return;

    // Update text
    t.textContent=txt;

    // Show with scale pop
    p.classList.remove('fading-out');
    p.classList.add('visible');
    p.style.transform='scale(1.03)';
    setTimeout(function(){p.style.transform='scale(1)'},300);

    // Activate the wave for this bubble's persona
    var w=waveIn(p);
    if(w)w.classList.add('speaking');

    currentBubble=p;
    lr=Date.now();

    // Auto-hide after 8 seconds — also stops the wave
    currentTimeout=setTimeout(function(){
      p.classList.remove('visible');
      p.classList.add('fading-out');
      if(w){w.classList.remove('speaking');w.classList.remove('sound-active')}
      currentBubble=null;
    },8000);
  }

  function conn(){
    if(ws&&(ws.readyState<2))return;
    try{ws=new WebSocket(WS)}catch(e){sr();return}
    ws.onopen=function(){ra=0;rc(false)};
    ws.onmessage=function(e){try{hm(JSON.parse(e.data))}catch(x){}};
    ws.onclose=function(){rc(true);sr()};
    ws.onerror=function(){};
  }
  function sr(){var d=Math.min(RB*Math.pow(1.5,ra),RM);ra++;setTimeout(conn,d)}
  function rc(s){var e=document.getElementById('recon');if(e){if(s)e.classList.add('show');else e.classList.remove('show')}}
  function showSponsor(copy){
    var sb=document.getElementById('sponsor-bubble'),st=document.getElementById('sponsor-text');
    if(!sb||!st)return;
    if(sponsorTimeout){clearTimeout(sponsorTimeout);sponsorTimeout=null}
    st.textContent=copy;
    sb.classList.remove('fading-out');
    sb.classList.add('visible');
    sb.style.transform='scale(1.03)';
    setTimeout(function(){sb.style.transform='scale(1)'},300);
    sponsorTimeout=setTimeout(function(){
      sb.classList.remove('visible');
      sb.classList.add('fading-out');
      sponsorTimeout=null;
    },15000);
  }

  // ───────── Fred sound effects system ─────────
  // Preload 12 Audio elements, play on sound_cue messages with 250ms fade in
  // and fade out (250ms before the clip ends). Hard volume cap at 0.3 —
  // producer panel controls the live target via fred_volume messages.
  var SOUND_NAMES=['rimshot','applause','sad-trombone','dramatic-sting','record-scratch','crickets','wrong-buzzer','cash-register','airhorn','laugh-track','boo','price-is-right-fail'];
  var SOUND_MAX=0.3,SOUND_DEFAULT=0.25;
  var fredAudioEnabled=true;
  var fredTargetVolume=SOUND_DEFAULT;
  var soundMap={};
  SOUND_NAMES.forEach(function(name){
    try{
      var a=new Audio('/sounds/'+name+'.mp3');
      a.preload='auto';
      a.volume=0;
      soundMap[name]=a;
    }catch(e){/* preload failures are non-fatal */}
  });

  function playCue(name){
    if(!fredAudioEnabled)return;
    if(!audioUnlocked){
      console.warn('[audio] sound_cue queued, prompt required:',name);
      pendingCue=name; // store for replay after unlock
      // showUnlockPrompt() is OBS-aware — no-op in broadcast, shown in regular browsers.
      showUnlockPrompt();
      return;
    }
    var a=soundMap[name];
    if(!a){console.warn('[fred] unknown sound:',name);return}
    // Ignore if already playing — no stacking
    if(!a.paused&&a.currentTime>0)return;
    var target=Math.min(SOUND_MAX,Math.max(0,fredTargetVolume));
    a.currentTime=0;

    // Light up Fred's wave in "sound-active" mode — harder pulse while audio plays.
    // The CSS selector is .speaking.sound-active, so this only takes effect if
    // Fred's bubble is currently visible. Correct: audio outlives bubble → wave stays off.
    var fredWave=waveIn(document.getElementById('panel-fred'));
    if(fredWave)fredWave.classList.add('sound-active');
    var clearSoundActive=function(){if(fredWave)fredWave.classList.remove('sound-active')};

    // For very short / unknown-duration clips, skip fade and play at target
    var dur=a.duration;
    if(!isFinite(dur)||dur<0.5){
      a.volume=target;
      a.addEventListener('ended',clearSoundActive,{once:true});
      a.play().catch(clearSoundActive);
      return;
    }
    // Fade in 0 → target over 250ms (50ms steps)
    a.volume=0;
    var stepIn=target/5;
    var fadeIn=setInterval(function(){
      a.volume=Math.min(target,a.volume+stepIn);
      if(a.volume>=target)clearInterval(fadeIn);
    },50);
    // Fade out starting 250ms before end
    var fadeOutTimer=setTimeout(function(){
      var stepOut=a.volume/5;
      var fadeOut=setInterval(function(){
        a.volume=Math.max(0,a.volume-stepOut);
        if(a.volume<=0)clearInterval(fadeOut);
      },50);
    },Math.max(0,(dur*1000)-250));
    a.addEventListener('ended',function(){
      clearTimeout(fadeOutTimer);
      a.volume=0;
      clearSoundActive();
    },{once:true});
    a.play().catch(clearSoundActive);
  }

  function hm(d){
    if(d.type==='troll_comment'){var id=MAP[d.persona];if(id&&d.text)showReaction(id,d.text)}
    if(d.type==='sponsor'&&d.copy){showSponsor(d.copy)}
    if(d.type==='status'&&d.session){var e=document.getElementById('status-session');if(e)e.textContent=d.session}
    if(d.type==='sound_cue'&&d.sound){playCue(d.sound)}
    if(d.type==='fred_audio_toggle'){fredAudioEnabled=!!d.enabled}
    if(d.type==='fred_volume'){fredTargetVolume=Math.min(SOUND_MAX,Math.max(0,Number(d.volume)||0))}
  }

  function tick(){
    if(P.get('mode')==='prod')return;
    setInterval(function(){
      var e=document.getElementById('status-ago');if(!e)return;
      if(!lr){e.textContent='';return}
      var s=Math.floor((Date.now()-lr)/1e3);
      e.textContent=s<5?'now':s<60?s+'s':Math.floor(s/60)+'m';
    },1e3);
  }

  // Demo mode — short punchy reactions
  var DM={
    jamie:['40x revenue multiple. That math doesn\'t math.',
      'Pre-money, not post. Big difference.',
      'SAFE notes convert at the cap. Correct.',
      'Unverifiable without actual MRR.'],
    delinquent:['Big Calendar is BEHIND THIS.',
      'Every meeting note is a PROPHECY.',
      'They call it productivity. I call it SURVEILLANCE.',
      'This changes EVERYTHING.'],
    taco:['Your meetings needed a $1.5B breakfast.',
      'Proof meetings could\'ve been emails.',
      'VCs paying more for notes than the meeting.',
      'Officer Calacanis, reporting for duty.']
  };
  function demo(){
    rc(false);
    var di={jamie:0,delinquent:0,taco:0},cy=0;
    // Show one at a time — each bubble pops, stays 8s, vanishes
    setTimeout(function(){
      showReaction(IDS[0],DM[IDS[0]][0]);di[IDS[0]]=1;
      setTimeout(function(){setInterval(function(){
        cy++;
        var id=IDS[cy%3],idx=di[id]%DM[id].length;
        showReaction(id,DM[id][idx]);di[id]=idx+1;
      },5000)},5000);
    },1500);
  }

  function init(){
    tick();
    // Fire-and-forget silent unlock attempt; show prompt if it fails.
    attemptAudioUnlock().then(function(ok){if(!ok)showUnlockPrompt()});
    if(isDemo)demo();else conn();
  }
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TWiSTroll</title>
<style>
:root{
  --jamie:#2DD4BF;
  --del:#F97316;
  --caut:#A78BFA;
  --taco:#84CC16;
  --tw:#FF4D00;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:rgba(0,0,0,0)!important;
  margin:0!important;padding:0!important;overflow:hidden!important;
  width:340px;height:1080px;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;
}

/* === CANVAS — fully transparent, bubbles float freely === */
.canvas{
  width:340px;height:1080px;
  position:relative;
}

/* === WATERMARK — barely there, top right corner === */
.wm{
  position:absolute;top:12px;right:14px;
  display:flex;align-items:center;gap:5px;
  opacity:0.5;
}
.wm-t{font-size:11px;font-weight:800;letter-spacing:-0.3px;color:var(--tw)}
.wm-r{font-size:11px;font-weight:800;letter-spacing:-0.3px;color:rgba(255,255,255,0.8)}
.wm .ld{
  width:5px;height:5px;border-radius:50%;background:#EF4444;
  will-change:opacity;animation:pulse 2s ease-in-out infinite;
}

/* === RECONNECTING === */
.recon{
  display:none;position:absolute;top:30px;right:14px;
  align-items:center;gap:4px;opacity:0.7;
}
.recon.show{display:flex}
.recon span{font-size:7px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:rgba(239,68,68,0.8)}
.recon .sp{
  width:6px;height:6px;
  border:1.5px solid rgba(239,68,68,0.3);border-top-color:#EF4444;
  border-radius:50%;will-change:transform;animation:spin 0.8s linear infinite;
}

/* ============================================================
   PERSONA BUBBLES
   
   Each persona owns a fixed vertical zone in the right side
   of the canvas. Bubbles don't jump around — the viewer
   always knows where to look for each voice.
   
   Zone layout (1080px height):
     Jamie:     200px - 350px  (upper-mid)
     Delinquent: 370px - 520px
     Cautious:  540px - 690px
     Taco:      710px - 860px
   
   Each bubble is a dark frosted pill floating on pure
   transparency. Persona-colored accent on the left edge.
   Invisible until first reaction arrives.
   ============================================================ */
.persona{
  position:absolute;
  right:14px;left:14px;
  opacity:0;
  visibility:hidden;
  will-change:transform,opacity;
  transition:opacity 300ms ease,visibility 0ms linear 300ms,transform 300ms ease-out;
  pointer-events:none;
}

/* Pop in — visible */
.persona.visible{
  opacity:1;visibility:visible;pointer-events:auto;
  transition:opacity 300ms ease,visibility 0ms linear 0ms,transform 300ms ease-out;
}

/* Fade out — slower exit */
.persona.fading-out{
  opacity:0;visibility:hidden;pointer-events:none;
  transition:opacity 500ms ease,visibility 0ms linear 500ms,transform 300ms ease-out;
}

/* All bubbles share one centered position (pop-and-vanish: only one visible at a time) */
.persona{top:400px}

/* === BUBBLE CARD === */
.bubble{
  background:rgba(255,255,255,0.04);
  border-radius:8px;
  padding:18px 20px;
  border-left:6px solid transparent;
  display:flex;
  align-items:flex-start;
  gap:16px;
}

/* === AVATAR container === */
.persona-avatar{
  width:52px;height:52px;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
.persona-avatar svg{width:46px;height:46px}

/* === TEXT container === */
.persona-info{flex:1;min-width:0}

/* === PERSONA NAME === */
.p-name{
  font-size:17px;font-weight:600;letter-spacing:-0.3px;
  margin-bottom:4px;display:block;
}

/* === REACTION TEXT === */
.reaction-text{
  font-size:14.8px;font-weight:400;line-height:1.42;
  color:rgba(255,255,255,0.92);
  will-change:opacity;transition:opacity 180ms ease;
  overflow:hidden;display:-webkit-box;
  -webkit-line-clamp:4;-webkit-box-orient:vertical;
}

/* ============================================================
   FOUR VOICES — color accents + typographic personality
   ============================================================ */

/* Jamie — teal */
.persona.jamie .bubble{border-left-color:var(--jamie)}
.persona.jamie .p-name{color:var(--jamie)}

/* Delinquent — orange */
.persona.delinquent .bubble{border-left-color:var(--del)}
.persona.delinquent .p-name{color:var(--del)}

/* Cautious — purple */
.persona.cautious .bubble{border-left-color:var(--caut)}
.persona.cautious .p-name{color:var(--caut)}

/* Taco — green */
.persona.taco .bubble{border-left-color:var(--taco)}
.persona.taco .p-name{color:var(--taco)}

/* ============================================================
   ANIMATIONS — transform + opacity only, OBS safe
   ============================================================ */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.2}}
@keyframes spin{to{transform:rotate(360deg)}}

/* === SNIPER BUBBLE — same position as persona bubbles, white accent === */
.persona.sniper .bubble{border-left-color:#FFFFFF}
.persona.sniper .sniper-label{
  font-size:11px;font-weight:700;letter-spacing:0.05em;
  text-transform:uppercase;color:#FFFFFF;margin-bottom:4px;display:block;
}
.persona.sniper .reaction-text{font-size:14.8px;line-height:1.42;color:#F1F5F9}

/* === SPONSOR BUBBLE — top of overlay, TWiST red accent === */
.sponsor-bubble{
  position:absolute;top:60px;left:10px;right:10px;
  background:rgba(255,77,0,0.12);
  border:1px solid rgba(255,77,0,0.4);
  border-left:3px solid #FF4D00;
  border-radius:8px;
  padding:10px 14px;
  opacity:0;visibility:hidden;
  will-change:transform,opacity;
  transition:opacity 300ms ease,visibility 0ms linear 300ms;
}
.sponsor-bubble.visible{
  opacity:1;visibility:visible;
  transition:opacity 300ms ease,visibility 0ms linear 0ms;
}
.sponsor-bubble.fading-out{
  opacity:0;visibility:hidden;
  transition:opacity 500ms ease,visibility 0ms linear 500ms;
}
.sponsor-header{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.sponsor-label{font-size:10px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;color:#FF4D00}
.sponsor-text{font-size:15px;font-weight:600;color:#F1F5F9;line-height:1.4}

/* Status — invisible in prod */
.status{
  position:absolute;bottom:4px;right:14px;
  display:flex;align-items:center;gap:3px;
  opacity:0.25;
}
.status span{font-size:6px;font-weight:500;color:rgba(255,255,255,0.5)}
body.prod .status{display:none}
</style>
</head>
<body>
<div class="canvas">

  <!-- Watermark — barely visible -->
  <div class="wm">
    <div class="ld"></div>
    <span class="wm-t">TWiST</span><span class="wm-r">roll</span>
  </div>

  <div class="recon" id="recon"><div class="sp"></div><span>Reconnecting</span></div>

  <!-- Sponsor bubble — top of overlay -->
  <div class="sponsor-bubble" id="sponsor-bubble">
    <div class="sponsor-header">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF4D00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
      <span class="sponsor-label">SPONSOR</span>
    </div>
    <div class="sponsor-text" id="sponsor-text"></div>
  </div>

  <!-- Jamie -->
  <div class="persona jamie" id="panel-jamie">
    <div class="bubble">
      <div class="persona-avatar">
        <svg width="46" height="46" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="19" fill="#1a2e2b" stroke="#2DD4BF" stroke-width="2"/><circle cx="14" cy="17" r="5" stroke="#2DD4BF" stroke-width="1.5" fill="none"/><circle cx="26" cy="17" r="5" stroke="#2DD4BF" stroke-width="1.5" fill="none"/><line x1="19" y1="17" x2="21" y2="17" stroke="#2DD4BF" stroke-width="1.5"/><circle cx="14" cy="17" r="1.5" fill="#2DD4BF"/><circle cx="26" cy="17" r="1.5" fill="#2DD4BF"/><line x1="15" y1="27" x2="25" y2="27" stroke="#2DD4BF" stroke-width="1.5" stroke-linecap="round"/><path d="M10 12 Q15 4, 20 8 Q25 4, 30 12" stroke="#2DD4BF" stroke-width="1.5" fill="none"/></svg>
      </div>
      <div class="persona-info">
        <span class="p-name">Not Jamie</span>
        <div class="reaction-text" id="text-jamie"></div>
      </div>
    </div>
  </div>

  <!-- Delinquent -->
  <div class="persona delinquent" id="panel-delinquent">
    <div class="bubble">
      <div class="persona-avatar">
        <svg width="46" height="46" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="19" fill="#2b1a0a" stroke="#F97316" stroke-width="2"/><circle cx="14" cy="18" r="3" stroke="#F97316" stroke-width="1.5" fill="none"/><circle cx="26" cy="18" r="3" stroke="#F97316" stroke-width="1.5" fill="none"/><circle cx="14" cy="18" r="1.5" fill="#F97316"/><circle cx="26" cy="18" r="1.5" fill="#F97316"/><ellipse cx="20" cy="28" rx="4" ry="3" stroke="#F97316" stroke-width="1.5" fill="none"/><path d="M12 8 Q14 2, 16 7 Q18 1, 20 6 Q22 0, 24 7 Q26 2, 28 8" stroke="#F97316" stroke-width="2" fill="none"/></svg>
      </div>
      <div class="persona-info">
        <span class="p-name">Not Delinquent</span>
        <div class="reaction-text" id="text-delinquent"></div>
      </div>
    </div>
  </div>

  <!-- Cautious -->
  <div class="persona cautious" id="panel-cautious">
    <div class="bubble">
      <div class="persona-avatar">
        <svg width="46" height="46" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="19" fill="#1a1528" stroke="#A78BFA" stroke-width="2"/><path d="M10 17 Q14 14, 18 17" stroke="#A78BFA" stroke-width="1.5" fill="none"/><path d="M22 17 Q26 14, 30 17" stroke="#A78BFA" stroke-width="1.5" fill="none"/><circle cx="14" cy="18" r="1.5" fill="#A78BFA" opacity="0.7"/><circle cx="26" cy="18" r="1.5" fill="#A78BFA" opacity="0.7"/><path d="M15 27 Q20 25, 25 27" stroke="#A78BFA" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      </div>
      <div class="persona-info">
        <span class="p-name">Not Cautious</span>
        <div class="reaction-text" id="text-cautious"></div>
      </div>
    </div>
  </div>

  <!-- Taco -->
  <div class="persona taco" id="panel-taco">
    <div class="bubble">
      <div class="persona-avatar">
        <svg width="46" height="46" viewBox="0 0 40 40" fill="none"><circle cx="20" cy="20" r="19" fill="#1a2010" stroke="#84CC16" stroke-width="2"/><path d="M9 14 L6 4 L14 11" stroke="#84CC16" stroke-width="1.5" fill="none"/><path d="M31 14 L34 4 L26 11" stroke="#84CC16" stroke-width="1.5" fill="none"/><circle cx="14" cy="18" r="3" fill="#84CC16" opacity="0.3"/><circle cx="26" cy="18" r="3" fill="#84CC16" opacity="0.3"/><circle cx="14" cy="18" r="1.5" fill="#84CC16"/><circle cx="26" cy="18" r="1.5" fill="#84CC16"/><ellipse cx="20" cy="23" rx="2" ry="1.5" fill="#84CC16" opacity="0.5"/><path d="M15 27 Q20 31, 25 27" stroke="#84CC16" stroke-width="1.5" fill="none" stroke-linecap="round"/></svg>
      </div>
      <div class="persona-info">
        <span class="p-name">Not Taco</span>
        <div class="reaction-text" id="text-taco"></div>
      </div>
    </div>
  </div>

  <!-- Sniper — question agent, no avatar -->
  <div class="persona sniper" id="panel-sniper">
    <div class="bubble">
      <div class="persona-info">
        <span class="sniper-label">ASK THIS</span>
        <div class="reaction-text" id="text-sniper"></div>
      </div>
    </div>
  </div>

  <div class="status" id="status-bar">
    <span id="status-session"></span>
    <span id="status-ago"></span>
  </div>

</div>

<script>
(function(){
  var WS='ws://localhost:3001',RB=1e3,RM=15e3;
  var ws,ra=0,lr=null;
  var P=new URLSearchParams(location.search);
  if(P.get('mode')==='prod')document.body.classList.add('prod');
  var isDemo=P.get('demo')==='true';
  var IDS=['jamie','delinquent','cautious','taco','sniper'];
  var MAP={'not-jamie':'jamie','not-delinquent':'delinquent','not-cautious':'cautious','not-taco':'taco',
           sniper:'sniper',jamie:'jamie',delinquent:'delinquent',cautious:'cautious',taco:'taco'};

  var currentTimeout=null,currentBubble=null;
  var sponsorTimeout=null;

  function showReaction(id,txt){
    // Hide any currently visible bubble
    if(currentBubble){
      currentBubble.classList.remove('visible');
      currentBubble.classList.add('fading-out');
      clearTimeout(currentTimeout);
      currentBubble=null;
    }

    var p=document.getElementById('panel-'+id),t=document.getElementById('text-'+id);
    if(!p||!t)return;

    // Update text
    t.textContent=txt;

    // Show with scale pop
    p.classList.remove('fading-out');
    p.classList.add('visible');
    p.style.transform='scale(1.03)';
    setTimeout(function(){p.style.transform='scale(1)'},300);

    currentBubble=p;
    lr=Date.now();

    // Auto-hide after 8 seconds
    currentTimeout=setTimeout(function(){
      p.classList.remove('visible');
      p.classList.add('fading-out');
      currentBubble=null;
    },8000);
  }

  function conn(){
    if(ws&&(ws.readyState<2))return;
    try{ws=new WebSocket(WS)}catch(e){sr();return}
    ws.onopen=function(){ra=0;rc(false)};
    ws.onmessage=function(e){try{hm(JSON.parse(e.data))}catch(x){}};
    ws.onclose=function(){rc(true);sr()};
    ws.onerror=function(){};
  }
  function sr(){var d=Math.min(RB*Math.pow(1.5,ra),RM);ra++;setTimeout(conn,d)}
  function rc(s){var e=document.getElementById('recon');if(e){if(s)e.classList.add('show');else e.classList.remove('show')}}
  function showSponsor(copy){
    var sb=document.getElementById('sponsor-bubble'),st=document.getElementById('sponsor-text');
    if(!sb||!st)return;
    if(sponsorTimeout){clearTimeout(sponsorTimeout);sponsorTimeout=null}
    st.textContent=copy;
    sb.classList.remove('fading-out');
    sb.classList.add('visible');
    sb.style.transform='scale(1.03)';
    setTimeout(function(){sb.style.transform='scale(1)'},300);
    sponsorTimeout=setTimeout(function(){
      sb.classList.remove('visible');
      sb.classList.add('fading-out');
      sponsorTimeout=null;
    },15000);
  }

  function hm(d){
    if(d.type==='troll_comment'){var id=MAP[d.persona];if(id&&d.text)showReaction(id,d.text)}
    if(d.type==='sponsor'&&d.copy){showSponsor(d.copy)}
    if(d.type==='status'&&d.session){var e=document.getElementById('status-session');if(e)e.textContent=d.session}
  }

  function tick(){
    if(P.get('mode')==='prod')return;
    setInterval(function(){
      var e=document.getElementById('status-ago');if(!e)return;
      if(!lr){e.textContent='';return}
      var s=Math.floor((Date.now()-lr)/1e3);
      e.textContent=s<5?'now':s<60?s+'s':Math.floor(s/60)+'m';
    },1e3);
  }

  // Demo mode — short punchy reactions
  var DM={
    jamie:['40x revenue multiple. That math doesn\'t math.',
      'Pre-money, not post. Big difference.',
      'SAFE notes convert at the cap. Correct.',
      'Unverifiable without actual MRR.'],
    delinquent:['Big Calendar is BEHIND THIS.',
      'Every meeting note is a PROPHECY.',
      'They call it productivity. I call it SURVEILLANCE.',
      'This changes EVERYTHING.'],
    cautious:['Won\'t exist in 3 years.',
      'Another one for the graveyard.',
      'Hype cycle is a circle.',
      'Every 2021 tool is a 404 now.'],
    taco:['Your meetings needed a $1.5B breakfast.',
      'Proof meetings could\'ve been emails.',
      'VCs paying more for notes than the meeting.',
      'Officer Calacanis, reporting for duty.']
  };
  function demo(){
    rc(false);
    var di={jamie:0,delinquent:0,cautious:0,taco:0},cy=0;
    // Show one at a time — each bubble pops, stays 8s, vanishes
    setTimeout(function(){
      showReaction(IDS[0],DM[IDS[0]][0]);di[IDS[0]]=1;
      setTimeout(function(){setInterval(function(){
        cy++;
        var id=IDS[cy%4],idx=di[id]%DM[id].length;
        showReaction(id,DM[id][idx]);di[id]=idx+1;
      },5000)},5000);
    },1500);
  }

  function init(){tick();if(isDemo)demo();else conn()}
  if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
  <!-- Option 3: Character face with sunglasses, smirk, and a $ earring.
       Matches the "character with personality" approach of Taco/Jamie. -->
  <circle cx="20" cy="20" r="19" fill="#2a1f08" stroke="#B8860B" stroke-width="2"/>
  <!-- sunglasses — two filled rounded rectangles connected by a bridge -->
  <rect x="9" y="15" width="9" height="5" rx="1.5" ry="1.5" fill="#B8860B" opacity="0.85"/>
  <rect x="22" y="15" width="9" height="5" rx="1.5" ry="1.5" fill="#B8860B" opacity="0.85"/>
  <line x1="18" y1="17.5" x2="22" y2="17.5" stroke="#B8860B" stroke-width="1.5"/>
  <!-- a tiny glint on the left lens -->
  <circle cx="11.5" cy="16.5" r="0.7" fill="#fff" opacity="0.6"/>
  <!-- smirk — asymmetric mouth -->
  <path d="M14 26 Q19 28, 24 25" stroke="#B8860B" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <!-- $ earring on the right side -->
  <circle cx="33" cy="22" r="1.8" stroke="#B8860B" stroke-width="1.2" fill="none"/>
  <text x="33" y="23.7" text-anchor="middle" font-family="serif" font-size="3.4" font-weight="700" fill="#B8860B">$</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 40 40" fill="none">
  <!-- Option 1: Tilted megaphone, pointed downward.
       The visual joke — the ad guy who's too cool to actually shill. -->
  <circle cx="20" cy="20" r="19" fill="#2a1f08" stroke="#B8860B" stroke-width="2"/>
  <!-- megaphone body, tilted ~25° down -->
  <path d="M11 22 L11 18 L22 14 L22 26 Z" stroke="#B8860B" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
  <!-- megaphone neck/handle -->
  <path d="M22 17 L26 16 L26 24 L22 23" stroke="#B8860B" stroke-width="1.5" stroke-linejoin="round" fill="none"/>
  <!-- handle grip -->
  <line x1="14" y1="26" x2="13" y2="30" stroke="#B8860B" stroke-width="1.5" stroke-linecap="round"/>
  <!-- faint sound dots — too cool to actually project -->
  <circle cx="29" cy="14" r="1.2" fill="#B8860B" opacity="0.6"/>
  <circle cx="31" cy="17" r="0.9" fill="#B8860B" opacity="0.4"/>
</svg>
